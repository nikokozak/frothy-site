<!doctype html>
<html lang="en">
<head>
<script>
  // Match frothy.dev: honor the shared `theme` key (explicit dark only).
  (function () {
    if (localStorage.getItem('theme') === 'dark') {
      document.documentElement.setAttribute('data-theme', 'dark');
    }
  })();
</script>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Frothy — flash a board</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./style.css">
</head>
<body>

<main id="app" hidden>
  <h1>Frothy</h1>
  <p class="meta">Install Frothy on a compatible ESP32 board.</p>

  <section id="picker">
    <p id="firmware-info" class="firmware-info" hidden>
      <span>Firmware</span>
      <strong id="firmware-label"></strong>
      <code id="firmware-version"></code>
    </p>
    <label id="firmware-picker" hidden>Firmware <select id="firmware"></select></label>
    <button id="flash" type="button">Flash Frothy</button>
  </section>

  <p id="status" class="status" role="status" aria-live="polite" hidden></p>
  <div id="progress-wrap" class="progress-wrap" hidden>
    <label for="progress">Flash progress</label>
    <progress id="progress" value="0" max="1"></progress>
  </div>

  <a id="continue" class="continue" href="../editor/" hidden>Continue to Editor</a>
</main>

<section id="fallback" hidden>
  <h1>Frothy</h1>
  <p>Web Serial is required; use a desktop Chrome, Edge, or Opera browser, or use the Frothy CLI.</p>
</section>

<noscript><p>JavaScript is required to flash Frothy from this page; use the Frothy CLI instead.</p></noscript>
<script type="module" src="./app.js"></script>
</body>
</html>
