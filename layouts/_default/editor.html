{{ define "head-extra" }}
  <link rel="stylesheet" href="{{ "test/editor/style.css" | relURL }}">
{{ end }}

{{ define "main" }}
<main class="editor-tool">
  <h1 class="sr-only">{{ .Title }}</h1>
  <div class="editor-tool-layout">
    <section id="editor" class="editor-host" aria-label="Frothy source editor"></section>
    <details class="editor-help" id="editor-help" open>
      <summary>
        <span class="editor-help-tab">{{ partial "icon" "circle-help" }}<span class="editor-help-label">Quick start</span></span>
      </summary>
      <div class="editor-help-body content">
        <p class="editor-help-lede">{{ .Description }}</p>
        {{ .Content }}
      </div>
    </details>
  </div>
</main>
<script type="module" src="{{ "test/editor/app.js" | relURL }}"></script>
{{ end }}
