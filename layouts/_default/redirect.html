{{ define "head-extra" }}
  <meta http-equiv="refresh" content="0; url={{ .Params.redirectTo }}">
  <link rel="canonical" href="{{ .Params.redirectTo }}">
{{ end }}

{{ define "main" }}
<main class="page redirect-page">
  <h1>{{ .Title }} moved to the Frothy app</h1>
  <p><a href="{{ .Params.redirectTo }}">Continue to {{ .Params.redirectTo }}</a></p>
</main>
<script>window.location.replace({{ .Params.redirectTo | jsonify | safeJS }});</script>
{{ end }}
