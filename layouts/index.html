{{ define "main" }}
<article class="homepage">
  {{ if fileExists "static/images/board.png" }}
  <figure class="home-hero">
    <img src="{{ "images/board.png" | relURL }}" alt="Froth board hero artwork">
  </figure>
  {{ end }}
  <div class="content">
    {{ .Content }}
  </div>
</article>
{{ end }}
