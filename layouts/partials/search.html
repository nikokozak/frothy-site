<div class="search-shell" data-search-shell hidden>
  <div class="search-backdrop" data-search-close></div>
  <section
    class="search-dialog"
    id="site-search-dialog"
    role="dialog"
    aria-modal="true"
    aria-labelledby="site-search-title"
  >
    <div class="search-header">
      <div>
        <p class="search-label" id="site-search-title">Search the docs</p>
        <p class="search-help">Guide, machine, workshop, reference, install, and deep content search.</p>
      </div>
      <button class="search-close" type="button" data-search-close aria-label="Close search">Close</button>
    </div>

    <label class="search-input-wrap" for="site-search-input">
      <span class="sr-only">Search query</span>
      <input
        id="site-search-input"
        class="search-input"
        type="search"
        placeholder="Search guide, machine, workshop, install, and reference..."
        autocomplete="off"
        spellcheck="false"
        data-search-input
      >
    </label>

    <p class="search-status" data-search-status>Start typing to search the docs.</p>
    <ol class="search-results" data-search-results></ol>
  </section>
</div>
