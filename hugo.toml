baseURL = "https://frothlang.org/"
languageCode = "en-us"
title = "Froth"
relativeURLs = true
disableKinds = ["taxonomy", "term"]

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    style = "monokailight"
    lineNos = false
    noClasses = false

[params]
  description = "A live lexical language for programmable devices."
